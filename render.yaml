```yaml
# =============================================================================
# Render.com Blueprint for ShiftWatch
# =============================================================================
# This file deploys database, backend API, and frontend in one go.
# =============================================================================

databases:
  - name: shiftwatch-db
    databaseName: shiftwatch_db
    user: shiftwatch_user   # ✅ fixed (was 'postgres')
    plan: free
    postgresMajorVersion: "16"

services:
  # ---------------------------------------------------------------------------
  # Backend API (Node/Express)
  # ---------------------------------------------------------------------------
  - type: web
    name: shiftwatch-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install --omit=dev --no-audit --no-fund
    startCommand: npm start
    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 10000

      - key: JWT_EXPIRES_IN
        value: 8h

      - key: JWT_SECRET
        generateValue: true

      # Database connection (auto-filled by Render)
      - key: DB_HOST
        fromDatabase:
          name: shiftwatch-db
          property: host

      - key: DB_PORT
        fromDatabase:
          name: shiftwatch-db
          property: port

      - key: DB_NAME
        fromDatabase:
          name: shiftwatch-db
          property: database

      - key: DB_USER
        fromDatabase:
          name: shiftwatch-db
          property: user

      - key: DB_PASSWORD
        fromDatabase:
          name: shiftwatch-db
          property: password

      # Set this AFTER frontend deploy
      - key: FRONTEND_URL
        sync: false

  # ---------------------------------------------------------------------------
  # Frontend (React Static Site)
  # ---------------------------------------------------------------------------
  - type: web
    name: shiftwatch-ui
    runtime: static
    rootDir: frontend
    buildCommand: npm install --no-audit --no-fund && npm run build
    staticPublishPath: ./build

    envVars:
      # Set this AFTER backend deploy
      - key: REACT_APP_API_URL
        sync: false

    routes:
      - type: rewrite
        source: /*
        destination: /index.html
```
